services:
  konsolx:
    image: ghcr.io/adhranjan/konsolx:latest
    container_name: konsolx
    restart: unless-stopped
    ports:
      - "${PORT:-8012}:${PORT:-8012}"
    environment:
      PORT: "${PORT:-8012}"
      DATA_DIR: /data
      USE_HOST_SHELL: "true"
      HOST_USER: "${HOST_USER}"
    volumes:
      - konsolx-data:/data
    privileged: true
    pid: host

volumes:
  konsolx-data:
