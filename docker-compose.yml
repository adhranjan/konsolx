# Konsolx — browser-based terminal workspace manager
#
# QUICK START:
#   HOST_USER=$(whoami) docker compose up -d
#   Open http://localhost:8012
#
# CUSTOM PORT:
#   PORT=9000 HOST_USER=$(whoami) docker compose up -d
#   Open http://localhost:9000
#
# STOP:
#   docker compose down
#
# HOST_USER is required — it sets which user's shell and environment
# (nvm, PATH, etc.) the terminals run as on your host machine.

services:
  konsolx:
    image: ghcr.io/adhranjan/konsolx:latest
    container_name: konsolx
    restart: unless-stopped
    ports:
      - "${PORT:-8012}:${PORT:-8012}"
    environment:
      PORT: "${PORT:-8012}"
      DATA_DIR: /data
      USE_HOST_SHELL: "true"
      HOST_USER: "${HOST_USER}"
    volumes:
      - konsolx-data:/data
    privileged: true
    pid: host

volumes:
  konsolx-data:
