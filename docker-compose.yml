version: '3.8'

services:
  konsolx:
    build: .
    container_name: konsolx
    ports:
      - "8012:3000"
    volumes:
      - ./terminal.db:/app/terminal.db
    # To access host shell, we need these:
    pid: host
    privileged: true
    environment:
      - USE_HOST_SHELL=true
      - PORT=3000
    restart: unless-stopped
