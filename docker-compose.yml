# Konsolx — browser-based terminal workspace manager
#
# ── LINUX ───────────────────────────────────────────────────────────────────
#   HOST_USER=$(whoami) docker compose up -d
#
# ── MAC ─────────────────────────────────────────────────────────────────────
#   1. Enable Remote Login: System Settings → General → Sharing → Remote Login
#   2. USE_SSH_SHELL=true HOST_USER=$(whoami) docker compose up -d
#
# ── WINDOWS ─────────────────────────────────────────────────────────────────
#   Not supported yet.
#
# ── OPTIONS ─────────────────────────────────────────────────────────────────
#   Custom port:  PORT=9000 HOST_USER=$(whoami) docker compose up -d
#   Dev mode:     KONSOLX_ENV=dev HOST_USER=$(whoami) docker compose up -d
#   Stop:         docker compose down

services:
  konsolx:
    image: ghcr.io/adhranjan/konsolx:latest
    container_name: konsolx
    restart: unless-stopped
    ports:
      - "${PORT:-8012}:${PORT:-8012}"
    environment:
      PORT: "${PORT:-8012}"
      DATA_DIR: /data
      USE_HOST_SHELL: "${USE_HOST_SHELL:-true}"
      USE_SSH_SHELL: "${USE_SSH_SHELL:-false}"
      HOST_USER: "${HOST_USER}"
      HOST_OS: "${HOST_OS:-linux}"
      KONSOLX_ENV: "${KONSOLX_ENV:-release}"
    volumes:
      - konsolx-data:/data
      - ~/.ssh:/root/.ssh:ro
    privileged: true
    pid: host

volumes:
  konsolx-data:
