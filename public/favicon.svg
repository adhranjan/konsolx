<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark background rounded square -->
  <rect width="32" height="32" rx="7" fill="#0a0a0a"/>

  <!-- Terminal window chrome - top bar -->
  <rect x="4" y="4" width="24" height="24" rx="3" fill="#141414"/>
  <rect x="4" y="4" width="24" height="6" rx="3" fill="#1e1e1e"/>
  <rect x="4" y="7" width="24" height="3" fill="#1e1e1e"/>

  <!-- Traffic light dots -->
  <circle cx="8.5" cy="7" r="1.2" fill="#ff5f57"/>
  <circle cx="12" cy="7" r="1.2" fill="#ffbd2e"/>
  <circle cx="15.5" cy="7" r="1.2" fill="#27c93f"/>

  <!-- Prompt: > symbol in emerald -->
  <path d="M7.5 17.5 L11 15.5 L7.5 13.5" stroke="#10b981" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Cursor block blinking -->
  <rect x="12.5" y="13" width="3.5" height="5" rx="0.5" fill="#10b981" opacity="0.9"/>

  <!-- Faint second line suggesting more output -->
  <rect x="7.5" y="21" width="10" height="1.2" rx="0.6" fill="#e0e0e0" opacity="0.15"/>
  <rect x="7.5" y="23.2" width="7" height="1.2" rx="0.6" fill="#e0e0e0" opacity="0.1"/>
</svg>
